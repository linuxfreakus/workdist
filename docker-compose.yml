version: '3'
services:
  api:
    image: 'com.example/workdist-api'
    ports:
      - '8080:8080'
    depends_on:
      - 'db'
  db:
    image: 'postgres:12.1-alpine'
    volumes:
      - 'pg_data:/var/lib/postgresql/data/pg_data'
    environment:
      POSTGRES_HOST: 'db'
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: 'postgres'
      POSTGRES_DB: 'workdist'
      POSTGRES_PORT: '5432'
      PGDATA: '/var/lib/postgresql/data/pg_data'
    ports:
      - '5432:5432'
volumes:
  pg_data:
